<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebaad's Canva Design</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 2.5em;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .embed-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .canva-embed {
            position: relative;
            width: 100%;
            height: 0;
            padding-top: 56.2225%;
            padding-bottom: 0;
            box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
            margin-top: 1.6em;
            margin-bottom: 0.9em;
            overflow: hidden;
            border-radius: 8px;
            will-change: transform;
        }
        .canva-embed iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: none;
            padding: 0;
            margin: 0;
        }
        .embed-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.9;
        }
        .embed-link a {
            color: white;
            text-decoration: none;
        }
        .embed-link a:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            font-size: 0.8em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header>
        <h1>🌟 Elecandgas Business Design</h1>
    </header>
    
    <div class="embed-container">
        <div class="canva-embed">
            <iframe 
                loading="lazy" 
                src="https://www.canva.com/design/DAHGBYLiEnA/Fe7rQ3kg5XXTrfgeXcKI5w/view?embed" 
                allowfullscreen="allowfullscreen" 
                allow="fullscreen">
            </iframe>
        </div>
        <div class="embed-link">
            <a href="https://www.canva.com/design/DAHGBYLiEnA/Fe7rQ3kg5XXTrfgeXcKI5w/view?utm_content=DAHGBYLiEnA&utm_campaign=designshare&utm_medium=embeds&utm_source=link" target="_blank" rel="noopener">
                Copy of Elecandgas Business Website Design Concept
            </a> by Ebaad Ahmad
        </div>
    </div>
    
    <footer>
        Made by Ebaad Ahmad | Hosted on GitHub Pages
    </footer>
</body>
</html>
